name: Push Zigbee2MQTT to Main Add-Ons Suite
on:
  push:
    branches: master
  workflow_dispatch:

jobs:
  push-job:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        zb: [zb01, zb02, zb03, zb04, zb05, zb06, zb07, zb08, zb09, zb10, zigbee2mqtt-edge, zigbee2mqtt-proxy, common]
      max-parallel: 1
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          # Source is the current repo; the automatic GITHUB_TOKEN can always
          # read it. Do NOT use API_TOKEN_GITHUB here — that PAT is scoped to
          # the target repo only and fails to authenticate the source fetch
          # ("could not read Username"), which silently skipped the sync.
          path: source

      - name: Set up SSH deploy key for target
        run: |
          # SSH_DEPLOY_KEY is a read/write deploy key registered on
          # racksync/hass-addons-suite. Deploy keys don't expire, so this
          # replaces the API_TOKEN_GITHUB PAT that kept lapsing.
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/suite_deploy_key
          chmod 600 ~/.ssh/suite_deploy_key
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf 'Host github.com\n  IdentityFile ~/.ssh/suite_deploy_key\n  IdentitiesOnly yes\n' >> ~/.ssh/config

      - name: Checkout target repository
        run: git clone git@github.com:racksync/hass-addons-suite.git target

      - name: Sync ${{ matrix.zb }} to target repository
        run: |
          cd source
          if [ -d "${{ matrix.zb }}" ]; then
            echo "Syncing ${{ matrix.zb }} directory..."
            rsync -av --delete "${{ matrix.zb }}/" "../target/multipoint-zigbee/${{ matrix.zb }}/"
            cd ../target
            git config --local user.email "devops@racksync.com"
            git config --local user.name "racksync"
            git add multipoint-zigbee/${{ matrix.zb }}/
            if git diff --staged --quiet; then
              echo "No changes to commit for ${{ matrix.zb }}"
            else
              git commit -m "${{ matrix.zb }} has been updated from legacy codebase"
              # Pull latest changes before pushing to avoid conflicts
              git pull origin main --rebase
              git push origin main
              echo "Successfully pushed ${{ matrix.zb }} updates"
            fi
          else
            echo "Directory ${{ matrix.zb }} does not exist in source repository"
            exit 1
          fi
